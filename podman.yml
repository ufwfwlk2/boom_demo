version: '3.8'

# 先在宿主机执行 npm run build，再启动静态 nginx 容器：
#   podman-compose -f podman.yml up -d --build
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NGINX_IMAGE: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:alpine}
    container_name: heykool_ops_workbench
    ports:
      - '8509:3002'
    restart: unless-stopped
    environment:
      - VITE_BOOMCLIP_API_BASE_URL=${VITE_BOOMCLIP_API_BASE_URL:-http://boomclip.heykoolai.com:8513}
      - VITE_BOOMCLIP_AUTH_BASE_URL=${VITE_BOOMCLIP_AUTH_BASE_URL:-http://boomclip.heykoolai.com:8512}
      - VITE_BOOMCLIP_LOGIN_PHONE=${VITE_BOOMCLIP_LOGIN_PHONE:-13800138000}
      - VITE_PREVIEW_DEV_MODE=${VITE_PREVIEW_DEV_MODE:-false}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./dist:/usr/share/nginx/html/heykool-ops-workbench:ro
    extra_hosts:
      - 'host.docker.internal:10.89.0.1'
    dns:
      - 10.89.0.1
    networks:
      - heykool_ops_network

networks:
  heykool_ops_network:
    name: heykool_ops_network
